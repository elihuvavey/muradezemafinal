name: iOS Build
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable
      - run: flutter pub get
      - run: |
          cd ios
          pod install --repo-update
      - run: flutter build ios --release --no-codesign 2>&1 | tee build.log
      - name: Show errors only
        if: failure()
        run: grep -i "error" build.log || echo "No error lines found"
