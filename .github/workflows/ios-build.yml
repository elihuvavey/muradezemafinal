name: iOS Build & TestFlight
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
      - run: flutter pub get
      - run: cd ios && pod install --repo-update
      - run: flutter build ios --release --no-codesign
      - name: Export IPA
        env:
          KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          P8: ${{ secrets.APPSTORE_P8 }}
        run: |
          echo "$P8" > /tmp/AuthKey.p8
          cd ios
          xcodebuild -exportArchive -archivePath ../build/ios/archive/Runner.xcarchive -exportPath ../build/ios/ipa -exportOptionsPlist ExportOptions.plist -authenticationKeyID "$KEY_ID" -authenticationKeyIssuerID "$ISSUER_ID" -authenticationKeyPath /tmp/AuthKey.p8
      - uses: actions/upload-artifact@v4
        with:
          name: Runner.ipa
          path: build/ios/ipa/Runner.ipa
