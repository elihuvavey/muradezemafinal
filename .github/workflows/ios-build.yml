name: iOS Build
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable
      - run: flutter pub get
      - run: |
          cd ios
          pod install --repo-update
      - name: Set Development Team
        run: |
          cd ios
          /usr/libexec/PlistBuddy -c "Add :DevelopmentTeam string K7R3D85XYA" Runner.xcodeproj/project.pbxproj 2>/dev/null || true
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = K7R3D85XYA;/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = K7R3D85XYA;/g' Runner.xcodeproj/project.pbxproj
      - run: flutter build ios --release --no-codesign
