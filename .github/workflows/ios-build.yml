name: iOS Build & App Store Upload

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
      - run: flutter pub get
      - run: cd ios && pod install
      - name: Build iOS
        run: flutter build ios --release --no-codesign
