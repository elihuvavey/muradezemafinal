name: iOS Build & Upload
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.9'
      - name: Select Latest Xcode
        run: sudo xcode-select -s /Applications/Xcode_17.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
      - name: Use Latest Xcode
        run: |
          ls /Applications/Xcode*.app
          sudo xcode-select -s $(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer
          xcodebuild -version
      - name: Select Newest Xcode
        run: |
          NEWEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Found: $NEWEST"
          sudo xcode-select -s "$NEWEST/Contents/Developer"
          xcodebuild -version
      - run: flutter pub get
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios
      - run: gem install cocoapods
      - run: pod install --repo-update
        working-directory: ios
      - name: Fastlane
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_P8_BASE64: ${{ secrets.APPSTORE_P8_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_BUNDLE_ID: ${{ secrets.APPLE_BUNDLE_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: bundle exec fastlane ios beta
        working-directory: ios
      - name: Upload Flutter Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: build/ios/logs/
