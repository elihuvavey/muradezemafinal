workflows:
  ios-simulator:
    name: iOS Simulator Preview
    max_build_duration: 60
    environment:
      flutter: 3.41.9
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter pub get
      - name: Set up iOS dependencies
        script: |
          cd ios && pod install --repo-update
      - name: Build for iOS Simulator
        script: |
          flutter build ios --simulator --debug
    artifacts:
      - build/ios/iphonesimulator/Runner.app

  ios-release:
    name: Murade Zema iOS Release
    max_build_duration: 120
    environment:
      flutter: 3.41.9
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter pub get
      - name: Set up iOS dependencies
        script: |
          cd ios && pod install --repo-update
      - name: Build iOS release
        script: |
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - afroeltechnologies@gmail.com
