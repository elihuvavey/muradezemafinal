workflows:
  ios-simulator:
    name: iOS Simulator Preview
    max_build_duration: 60
    environment:
      flutter: 3.41.9
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get
      - name: Set up iOS dependencies
        script: cd ios && pod install --repo-update
      - name: Build iOS for Simulator
        script: flutter build ios --simulator --debug
    artifacts:
      - build/ios/iphonesimulator/Runner.app

  ios-appstore:
    name: iOS App Store
    max_build_duration: 60
    environment:
      flutter: 3.41.9
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get
      - name: Set up iOS dependencies
        script: cd ios && pod install --repo-update
      - name: Build iOS for App Store
        script: flutter build ipa --release --export-method app-store
    artifacts:
      - build/ios/ipa/*.ipa
